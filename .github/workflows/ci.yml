name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes to same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Code is not formatted. Run 'gofmt -w .' to fix."
            gofmt -d .
            exit 1
          fi

      - name: Check CHANGELOG PR-link placeholders
        run: |
          # The changelog entry template uses #NNN as a placeholder for the PR
          # number. Leaving it unfilled has slipped through review repeatedly
          # (#383, #384), so fail fast if any placeholder remains.
          if grep -nE '#NNN|pull/NNN' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has an unfilled PR-number placeholder. Replace NNN with the real PR number."
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up bats
        uses: bats-core/bats-action@3.0.1

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run hook tests
        run: bats .claude/hooks/

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Restart Docker daemon
        run: |
          # Restart Docker to ensure clean BuildKit state
          sudo systemctl restart docker
          # Wait for Docker to be ready
          docker info

      - name: Pre-pull base images
        run: |
          docker pull debian:bookworm-slim
          docker pull python:3.11-slim
          docker pull node:20-slim
          docker pull golang:1.22
          docker pull ubuntu:22.04

      - name: Pre-build moat binary and test binary
        run: |
          # Build the moat binary ahead of time so TestMain doesn't need to
          # compile it (which produces no output and can appear to hang).
          mkdir -p /tmp/moat-e2e-bin
          go build -o /tmp/moat-e2e-bin/moat github.com/majorcontext/moat/cmd/moat
          echo "MOAT_EXECUTABLE=/tmp/moat-e2e-bin/moat" >> "$GITHUB_ENV"
          # Pre-compile the test binary so `go test` doesn't hang during
          # compilation (which produces no output and bypasses -timeout).
          go test -tags=e2e -c -o /tmp/moat-e2e-bin/e2e.test ./internal/e2e/

      - name: Run E2E tests
        run: |
          /tmp/moat-e2e-bin/e2e.test -test.v -test.timeout=30m \
            > /tmp/e2e-output.log 2>&1 &
          TEST_PID=$!
          # Poll for completion with hard wall-clock cutoff (35 min).
          # If the test process gets stuck in D-state, kill -9 may not
          # work but the job-level timeout-minutes will eventually kill
          # the runner.
          SECONDS=0
          while kill -0 $TEST_PID 2>/dev/null; do
            if [ $SECONDS -ge 2100 ]; then
              echo "::error::Tests exceeded 35-minute wall-clock limit, killing"
              kill -9 $TEST_PID 2>/dev/null || true
              sleep 2
              break
            fi
            sleep 10
          done
          wait $TEST_PID 2>/dev/null || true
          EXIT_CODE=$?
          echo "Test exited with code $EXIT_CODE"
          cat /tmp/e2e-output.log || echo "(no output file)"
          exit $EXIT_CODE
        env:
          MOAT_DISABLE_BUILDKIT: "1"
          MOAT_NO_SANDBOX: "1"

      - name: Upload E2E test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-logs
          path: /tmp/e2e-output.log
          retention-days: 7
